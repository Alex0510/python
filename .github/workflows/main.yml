name: Build DEB with Theos

on:
  push:
    tags: [ 'v*' ]          # 推送 tag 时触发（格式如 v1.0.0）
  workflow_dispatch:         # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y \
            git build-essential clang fakeroot dpkg-dev \
            libc6-dev curl perl xz-utils lld llvm

      - name: 手动安装 ldid
        run: |
          sudo curl -L -o /usr/local/bin/ldid \
            https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_x86_64
          sudo chmod +x /usr/local/bin/ldid
          ldid --version || echo "ldid 安装成功"

      - name: 验证 ld.lld 可用
        run: |
          which ld.lld
          ld.lld --version

      - name: 缓存 Theos 和 SDK
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: $HOME/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: 安装 Theos 和 SDK（如果缓存未命中）
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks-repo
          mkdir -p $HOME/theos/sdks
          cp -r $HOME/theos/sdks-repo/iPhoneOS14.5.sdk $HOME/theos/sdks/ || {
            echo "错误：未找到 iPhoneOS14.5.sdk，请检查 sdks 仓库内容"
            exit 1
          }
          rm -rf $HOME/theos/sdks-repo
          mkdir -p $HOME/theos/toolchain/linux/iphone/bin
          ln -sf /usr/bin/clang $HOME/theos/toolchain/linux/iphone/bin/clang
          ln -sf /usr/bin/clang++ $HOME/theos/toolchain/linux/iphone/bin/clang++
          echo "Theos 和 SDK 安装完成"

      - name: 准备 lipo 工具
        run: |
          LIPO_PATH=$(which llvm-lipo 2>/dev/null || \
                      which llvm-lipo-18 2>/dev/null || \
                      which llvm-lipo-17 2>/dev/null || \
                      which llvm-lipo-16 2>/dev/null || \
                      which llvm-lipo-15 2>/dev/null)
          if [ -z "$LIPO_PATH" ]; then
            echo "错误：找不到 llvm-lipo。请确保已安装 llvm 包。"
            exit 1
          fi
          echo "找到 lipo: $LIPO_PATH"
          mkdir -p $HOME/theos/toolchain/linux/iphone/bin
          ln -sf $LIPO_PATH $HOME/theos/toolchain/linux/iphone/bin/lipo
          echo "lipo 链接已创建"

      - name: 设置环境变量
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "TARGET=iphone:clang:latest" >> $GITHUB_ENV
          echo "ARCHS=arm64" >> $GITHUB_ENV
          echo "LD=/usr/bin/ld.lld" >> $GITHUB_ENV
          echo "LDFLAGS=-fuse-ld=lld" >> $GITHUB_ENV

      - name: 创建输出目录
        run: mkdir -p output

      - name: 构建 .deb 包
        run: |
          make clean || true
          make package TARGET=iphone:clang:latest LD=/usr/bin/ld.lld LDFLAGS="-fuse-ld=lld" ARCHS=arm64
          find . -name "*.deb" -exec mv {} output/ \;

      - name: 提取版本号
        id: version
        run: |
          # 尝试查找 control 文件（支持根目录或 layout/DEBIAN/）
          CONTROL_FILE=""
          if [ -f "control" ]; then
            CONTROL_FILE="control"
          elif [ -f "layout/DEBIAN/control" ]; then
            CONTROL_FILE="layout/DEBIAN/control"
          fi

          if [ -n "$CONTROL_FILE" ]; then
            VERSION=$(grep "^Version:" "$CONTROL_FILE" | awk '{print $2}' | head -1)
          fi

          if [ -z "$VERSION" ]; then
            VERSION="0.0.1"
            echo "警告：未找到 Version 字段，使用默认值 0.0.1"
          fi

          echo "提取到的版本号：$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 重命名 .deb 文件
        run: |
          echo "当前版本号：${VERSION}"
          cd output
          # 找到第一个 .deb 文件
          DEB_FILE=$(find . -maxdepth 1 -name "*.deb" | head -1)
          if [ -n "$DEB_FILE" ]; then
            mv "$DEB_FILE" "PythonHook-${VERSION}.deb"
            echo "已重命名为 PythonHook-${VERSION}.deb"
          else
            echo "错误：未找到 .deb 文件"
            exit 1
          fi

      - name: 打包源码
        run: |
          mkdir -p output   # 确保 output 目录存在
          git archive --format=zip --output=output/PythonHook-source.zip HEAD
          if [ ! -f "output/PythonHook-source.zip" ]; then
            echo "错误：源码包生成失败！"
            exit 1
          fi
          echo "源码包生成成功：$(ls -la output/PythonHook-source.zip)"

      - name: 列出 output 目录内容（调试）
        run: ls -la output/

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            output/PythonHook-${{ env.VERSION }}.deb
            output/PythonHook-source.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 .deb 包到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PythonHook-${{ env.VERSION }}.deb
          path: output/PythonHook-${{ env.VERSION }}.deb
          if-no-files-found: error

      - name: 上传源码包到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PythonHook-source.zip
          path: output/PythonHook-source.zip
          if-no-files-found: error